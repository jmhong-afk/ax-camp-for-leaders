<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AX Camp for Leaders - AI Studio App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-iframe {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <iframe
            src="https://aistudio.google.com/apps/6bf0c59b-65c3-42d8-b7ac-adc921da7cd0?fullscreenApplet=true"
            class="app-iframe"
            title="AX Camp for Leaders AI App"
            allow="clipboard-read; clipboard-write"
        ></iframe>
    </div>

    <script>
        // Handle iframe loading
        const iframe = document.querySelector('.app-iframe');
        iframe.addEventListener('load', function() {
            console.log('AI Studio App loaded successfully');
        });

        // Error handling
        iframe.addEventListener('error', function() {
            console.error('Failed to load AI Studio App');
        });
    </script>
</body>
</html>
